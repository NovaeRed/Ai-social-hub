server:
  port: 8080
spring:
  application:
    name: ai-social-app
  datasource:
    url: jdbc:postgresql://192.168.80.128:5432/ai_social_hub
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: 192.168.80.128
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: cn.redture
  configuration:
    default-enum-type-handler: cn.redture.common.util.PgEnumTypeHandler # 自定义枚举处理器
logging:
  level:
    cn.redture: debug

ai:
  persona:
    executor:
      threadNamePrefix: ai-persona-
      corePoolSize: 4
      maxPoolSize: 8
      queueCapacity: 100

jwt:
  secret: ai-social-project-secret-key-for-jwt-authentication-hs256-20240520
  access_token_expiration: 900 # 15 minutes in seconds
  refresh_token_expiration_seconds: 604800 # 7 days in seconds
