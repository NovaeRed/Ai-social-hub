server:
  port: 8080
spring:
  application:
    name: ai-social-app
  datasource:
    url: jdbc:postgresql://localhost/ai_social_hub
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: 192.168.80.128
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
      
  # Spring AI Alibaba (Qwen)
  ai:
    dashscope:
      api-key: ${Qwen-api}
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      default-model: qwen-max
      timeout: 60000

mybatis-plus:
  type-aliases-package: cn.redture
  configuration:
    default-enum-type-handler: cn.redture.common.util.PgEnumTypeHandler # 自定义枚举处理器
logging:
  level:
    cn.redture: debug

ai:
  persona:
    consumer:
      enabled: true

  # Qwen配置
  qwen:
    api-key: ${Qwen-api}
    base-url: ${Qwen-base-url:https://dashscope.aliyuncs.com/compatible-mode/v1}
    default-model: qwen-max
    timeout: 60000

jwt:
  secret: ai-social-project-secret-key-for-jwt-authentication-hs256-20240520
  access_token_expiration: 900 # 15 minutes in seconds
  refresh_token_expiration_seconds: 604800 # 7 days in seconds

app:
  security:
    entry-rate-limit:
      enabled: true
      exclude-patterns:
        - /error
      default-rule:
        name: global-baseline
        pattern: /**
        max-requests: 300
        window-seconds: 60
        strategy: IP
      rules:
        - name: auth-login
          pattern: /auth/login
          max-requests: 10
          window-seconds: 60
          strategy: IP
        - name: auth-register
          pattern: /auth/register
          max-requests: 10
          window-seconds: 60
          strategy: IP
        - name: chat-create-message
          pattern: /conversations/*/messages
          max-requests: 60
          window-seconds: 60
          strategy: USER_OR_IP
        - name: ai-task-write
          pattern: /api/v1/ai/tasks/*
          max-requests: 10
          window-seconds: 60
          strategy: USER_OR_IP
  resilience:
    sentinel:
      enabled: true
      flow-rules:
        # 全局轻限流，作为系统保护阈值
        - resource: chat:message:create
          grade: 1
          count: 20
          control-behavior: 0
      degrade-rules:
        # 核心接口熔断，先采用异常比例策略
        - resource: chat:message:create
          grade: 1
          count: 0.5
          time-window: 10
          min-request-amount: 20
          stat-interval-ms: 60000
