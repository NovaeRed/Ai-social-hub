version: "3.9"
services:
  app:
    build: .
    container_name: ai-social-hub
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms512m -Xmx1024m"
    volumes:
      - ./config:/app/config
      - ./logs:/app/log
    command: >
      sh -c "java $JAVA_OPTS -jar /app/app.jar
      --spring.config.additional-location=file:/app/config/"
    restart: unless-stopped